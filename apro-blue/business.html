<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APRO | 사업영역</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  @font-face{
    font-family:"SUIT Variable";
    src:url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.woff2") format("woff2-variations");
    font-weight:100 900;font-display:swap;
  }
  :root{
    --g900:#1b2733;--secondary-bg:#f4f6f8;--brand:#2c5790;--point-600:#2c5790;
    --clean-blue:#2885ff;--sec-text:#445464;--teritary:#96a3b3;--border-g:#e4e8ed;
    --dark:#0e161e;--dark-2:#2e3c4b;--gray-700:#445464;
    --suit:"SUIT Variable","Pretendard",sans-serif;--pre:"Pretendard",sans-serif;
    --ease:cubic-bezier(.22,1,.36,1);--maxw:1440px;   /* match home banner/GNB line (content column = 1440-48 = 1392) */
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--pre);background:var(--secondary-bg);color:var(--g900);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  img{display:block;max-width:none}
  button{font-family:inherit;background:none;border:none;cursor:pointer;color:inherit}
  a{text-decoration:none;color:inherit}

  /* ---- home / back button (top-left, over header) ---- */
  .sub-home{position:fixed;left:24px;top:20px;z-index:50;height:40px;display:flex;align-items:center;gap:12px;padding-right:12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
  .sub-home .ic{width:28px;height:28px;flex-shrink:0;border:1px solid var(--gray-700);display:grid;place-content:center}
  .sub-home .ic svg{width:20px;height:20px}
  .sub-home .ic path{stroke:var(--g900)}
  .sub-home .lb{font-family:var(--pre);font-weight:500;font-size:14px;letter-spacing:-.28px;color:var(--g900)}

  /* ---- header (node 106:5296): default row + inline expanding area tabs ---- */
  .sub-head{position:relative;z-index:20;background:#fff;box-shadow:0 4px 20px -6px rgba(11,11,10,.1)}
  .sub-head-top{width:100%;max-width:var(--maxw);margin-inline:auto;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:32px 24px 24px;cursor:pointer}
  .sub-head .tt{display:flex;flex-direction:column;gap:8px}
  .sub-head .tt .h{font-family:var(--suit);font-weight:800;font-size:20px;line-height:1.2;letter-spacing:-.4px;color:var(--g900)}
  .sub-head .tt .s{font-family:var(--suit);font-weight:600;font-size:14px;line-height:1.35;letter-spacing:-.28px;color:var(--sec-text)}
  .sub-head .drop{width:24px;height:24px;flex-shrink:0;display:grid;place-content:center;color:var(--g900);margin-top:2px}
  .sub-head .drop svg{width:24px;height:24px;transition:transform .3s var(--ease)}
  .sub-head.open .drop svg{transform:rotate(180deg)}
  /* inline area tabs (expand on open) */
  .sub-tabs{width:100%;max-width:var(--maxw);margin-inline:auto;padding:0 24px;display:flex;max-height:0;overflow:hidden;opacity:0;transition:max-height .35s var(--ease),opacity .3s var(--ease)}
  .sub-head.open .sub-tabs{max-height:80px;opacity:1}
  .sub-tab{flex:1;min-width:0;padding:8px 12px;font-family:var(--suit);font-weight:800;font-size:14px;line-height:1.35;letter-spacing:-.28px;color:var(--sec-text);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:background .2s,color .2s}
  .sub-tab:hover{background:var(--secondary-bg)}
  .sub-tab.active{background:#4077b7;color:rgba(255,255,255,.92)}

  /* ---- main ---- */
  .sub-main{flex:1;width:100%;display:flex;flex-direction:column;min-height:0}
  .sub-stage{flex:1;width:100%;max-width:var(--maxw);margin-inline:auto;display:flex;align-items:center;justify-content:space-between;gap:24px;padding:40px 24px 24px;min-height:0;animation:subUp .6s var(--ease) both}
  .sub-imgwrap{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;height:100%;max-height:420px}
  .sub-imgwrap img{max-width:100%;max-height:420px;width:auto;height:auto;object-fit:contain}
  .sub-imgwrap .ph{width:100%;max-width:600px;height:320px;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    border:1px dashed var(--border-g);background:#fff;color:var(--teritary);font-family:var(--suit);font-weight:600;font-size:18px;letter-spacing:-.36px}
  /* info card (right) */
  .sub-info{width:299px;flex:none;align-self:center;background:#fff}
  .sub-info .hd{background:var(--clean-blue);color:#fff;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  .sub-info .hd .t{font-family:var(--suit);font-weight:800;font-size:20px;line-height:1.2;letter-spacing:-.4px}
  .sub-info .hd .e{font-family:var(--suit);font-weight:800;font-size:14px;line-height:1.35;letter-spacing:-.28px}
  .sub-info .ls{padding:8px 12px 8px 4px;display:flex;flex-direction:column}
  .sub-info .ls .li{display:flex;gap:4px;align-items:flex-start;padding:8px 0}
  .sub-info .ls .li .dash{width:16px;height:16px;flex-shrink:0;position:relative;margin-top:4px}
  .sub-info .ls .li .dash::before{content:"";position:absolute;left:33%;right:33%;top:50%;height:1.5px;background:#5d6d7e}
  .sub-info .ls .li p{flex:1;min-width:0;font-family:var(--suit);font-weight:600;font-size:14px;line-height:1.6;letter-spacing:-.28px;color:var(--sec-text)}
  .sub-info .pg{border-top:1px solid var(--border-g);padding:12px;display:flex;align-items:center;justify-content:flex-end}
  .sub-info .pg .cur{font-family:var(--suit);font-weight:600;font-size:16px;letter-spacing:-.32px;color:var(--point-600)}
  .sub-info .pg .tot{font-family:var(--suit);font-weight:600;font-size:16px;letter-spacing:-.32px;color:var(--teritary)}
  @keyframes subUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* ---- bottom sub-category groups ---- */
  .sub-groups{width:100%;max-width:var(--maxw);margin-inline:auto;display:flex;gap:12px;padding:24px}
  .grp{flex:1;min-width:0;background:var(--dark);padding:4px;display:flex;flex-direction:column;gap:4px}
  .grp .grp-hd{display:flex;align-items:center;gap:2px;padding:4px 0}
  .grp .grp-hd .dot{width:16px;height:16px;flex-shrink:0;display:grid;place-content:center}
  .grp .grp-hd .dot::before{content:"";width:5px;height:5px;border-radius:50%;background:#fff}
  .grp .grp-hd .nm{flex:1;min-width:0;font-family:var(--suit);font-weight:800;font-size:14px;line-height:1.35;letter-spacing:-.28px;color:#fff}
  .grp .grp-items{display:flex;flex-wrap:wrap;gap:4px}
  .pit{flex:1 0 0;min-width:72px;height:71px;border:1px solid var(--gray-700);display:flex;flex-direction:column;overflow:hidden;text-align:center}
  .pit.empty{background:var(--dark-2)}
  .pit .ic{height:44px;flex-shrink:0;background:var(--dark-2)}
  .pit .hd{flex:1;min-height:0;display:flex;align-items:center;padding:4px;background:var(--gray-700)}
  .pit .hd .nm{flex:1;min-width:0;font-family:var(--suit);font-weight:800;font-size:14px;line-height:1.35;letter-spacing:-.28px;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pit.filled{cursor:pointer;transition:border-color .2s,transform .2s}
  .pit.filled:hover{border-color:#7fb4ff;transform:translateY(-2px)}
  .pit.active{border-color:var(--clean-blue);cursor:pointer}
  .pit.active .ic{background:var(--border-g)}
  .pit.active .hd{background:var(--clean-blue)}
  .pit.active .hd .nm{color:#fff}

  @media (prefers-reduced-motion:reduce){ .sub-stage{animation:none} .sub-head .drop svg,.sub-menu{transition:none} }
  /* narrow viewports: the content column reaches the fixed 홈으로 button, so drop the title
     back below it to avoid overlap (the top-line alignment only fits on wide screens) */
  @media (max-width:1660px){ .sub-head-top{padding-top:80px} }
  @media (max-width:900px){
    .sub-stage{flex-direction:column;align-items:stretch}
    .sub-info{width:100%;align-self:stretch}
    .sub-groups{flex-direction:column}
  }
</style>
</head>
<body>

<a class="sub-home" href="index.html" aria-label="홈으로">
  <span class="ic"><svg viewBox="0 0 20 20" fill="none"><path d="M12 4 6 10l6 6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
  <span class="lb">홈으로</span>
</a>

<header class="sub-head" id="subHead">

      <div class="pg"><span class="cur" id="prodNo">01</span><span class="tot" id="prodTot">/06</span></div>
    </div>
  </div>

  <div class="sub-groups" id="subGroups"></div>
</main>

  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function pad2(n){return (n<10?'0':'')+n;}

  var head=document.getElementById('subHead'),
      areaKor=document.getElementById('areaKor'),areaEn=document.getElementById('areaEn'),
      areaTabs=document.getElementById('areaTabs'),areaToggle=document.getElementById('areaToggle'),
      prodImg=document.getElementById('prodImg'),prodPh=document.getElementById('prodPh'),
      prodName=document.getElementById('prodName'),prodEn=document.getElementById('prodEn'),
      prodDesc=document.getElementById('prodDesc'),prodNo=document.getElementById('prodNo'),
      prodTot=document.getElementById('prodTot'),subGroups=document.getElementById('subGroups'),
      subStage=document.getElementById('subStage');

  var areaIdx=1, selGi=0, selPi=0;   // default: ESS -> 배터리 에너지 저장 시스템

  // area from ?area= (kor name or index)
  (function(){
    var q=new URLSearchParams(location.search).get('area');
    if(q!=null){
      var i=AREAS.findIndex(function(a){return a.kor===q;});
      if(i<0){ var n=parseInt(q,10); if(!isNaN(n)&&n>=0&&n<AREAS.length) i=n; }
      if(i>=0) areaIdx=i;
    }
  })();

  function buildTabs(){
    areaTabs.innerHTML=AREAS.map(function(a,i){
      return '<button class="sub-tab'+(i===areaIdx?' active':'')+'" data-i="'+i+'">'+esc(a.kor)+'</button>';
    }).join('');
    Array.prototype.forEach.call(areaTabs.querySelectorAll('.sub-tab'),function(b){
      b.addEventListener('click',function(e){ e.stopPropagation(); areaIdx=+b.getAttribute('data-i'); selGi=0; selPi=0; closeMenu(); render(); });
    });
  }
  function flat(a){ var f=[]; a.groups.forEach(function(g,gi){g.products.forEach(function(p,pi){f.push({gi:gi,pi:pi,p:p});});}); return f; }

  function render(){
    var a=AREAS[areaIdx];
    areaKor.textContent=a.kor; areaEn.textContent=a.en;
    var f=flat(a), total=f.length;
    var no=1; for(var i=0;i<f.length;i++){ if(f[i].gi===selGi&&f[i].pi===selPi){ no=i+1; break; } }
    var p=a.groups[selGi].products[selPi];
    prodName.textContent=p.n;
    if(p.en){ prodEn.textContent=p.en; prodEn.style.display='block'; } else { prodEn.style.display='none'; }
    var img=p.img||a.img;
    if(img){ prodImg.src=img; prodImg.alt=p.n; prodImg.style.display='block'; prodPh.style.display='none'; }
    else { prodImg.style.display='none'; prodPh.style.display='flex'; prodPh.textContent=p.n; }
    var ds=p.desc||['해당 제품의 상세 정보는 준비 중입니다.'];
    prodDesc.innerHTML=ds.map(function(d){return '<div class="li"><span class="dash"></span><p>'+esc(d)+'</p></div>';}).join('');
    prodNo.textContent=pad2(no); prodTot.textContent='/'+pad2(total);
    // groups
    subGroups.innerHTML=a.groups.map(function(g,gi){
      var items=g.products.map(function(pr,pi){
        var cls=(gi===selGi&&pi===selPi)?'active':'filled';
        return '<button class="pit '+cls+'" data-gi="'+gi+'" data-pi="'+pi+'"><span class="ic"></span><span class="hd"><span class="nm">'+esc(pr.n)+'</span></span></button>';
      });
      for(var k=g.products.length;k<5;k++) items.push('<span class="pit empty"></span>');
      return '<div class="grp"><div class="grp-hd"><span class="dot"></span><span class="nm">'+esc(g.name)+'</span></div><div class="grp-items">'+items.join('')+'</div></div>';
    }).join('');
    Array.prototype.forEach.call(subGroups.querySelectorAll('.pit.filled,.pit.active'),function(b){
      b.addEventListener('click',function(){ selGi=+b.getAttribute('data-gi'); selPi=+b.getAttribute('data-pi'); render(); });
    });
    // update tab active state
    Array.prototype.forEach.call(areaTabs.querySelectorAll('.sub-tab'),function(b){ b.classList.toggle('active', +b.getAttribute('data-i')===areaIdx); });
  }

  function openMenu(){ head.classList.add('open'); areaToggle.setAttribute('aria-expanded','true'); }
  function closeMenu(){ head.classList.remove('open'); areaToggle.setAttribute('aria-expanded','false'); }
  areaToggle.addEventListener('click',function(e){ e.stopPropagation(); head.classList.contains('open')?closeMenu():openMenu(); });
  document.addEventListener('click',function(e){ if(head.classList.contains('open') && !head.contains(e.target)) closeMenu(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeMenu(); });

  buildTabs();
  render();
</script>
