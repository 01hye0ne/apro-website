<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-PRO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      background: #0a0e1a;
      color: #fff;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      padding: 24px;
    }
    .logo { width: 180px; max-width: 60vw; height: auto; }
    .tagline { color: #8b93a7; font-size: 15px; letter-spacing: .02em; }
    .choices {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 200px;
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      color: #fff;
      text-decoration: none;
      transition: transform .25s ease, border-color .25s ease, background .25s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.4);
      background: rgba(255,255,255,.07);
    }
    .card .name { font-size: 19px; font-weight: 700; }
    .card .desc { font-size: 13px; color: #8b93a7; }
    .swatch { width: 44px; height: 44px; border-radius: 50%; margin-bottom: 6px; }
    .swatch.gray { background: linear-gradient(135deg, #6b7280, #374151); }
    .swatch.blue { background: linear-gradient(135deg, #3b6ef0, #1b3a8f); }
    footer { color: #4b5266; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <img class="logo" src="assets/logo-white.png" alt="A-PRO" />
  <p class="tagline">보실 버전을 선택하세요</p>
  <div class="choices">
    <a class="card" href="apro-gray/index.html">
      <span class="swatch gray"></span>
      <span class="name">Gray</span>
      <span class="desc">그레이 버전</span>
    </a>
    <a class="card" href="apro-blue/index.html">
      <span class="swatch blue"></span>
      <span class="name">Blue</span>
      <span class="desc">블루 버전</span>
    </a>
  </div>
  <footer>© A-PRO</footer>
</body>
</html>
